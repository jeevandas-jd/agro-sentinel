name: agro_sentinel
description: AI-powered crop damage assessment for Kerala farmers
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0

  # Maps
  google_maps_flutter: ^2.9.0

  # State management
  provider: ^6.1.0

  # Navigation
  go_router: ^14.0.0

  # ML inference
  tflite_flutter: ^0.10.4

  # Local storage
  hive_flutter: ^1.1.0

  # Camera and location
  camera: ^0.11.0
  geolocator: ^13.0.0
  image_picker: ^1.1.0
  exif: ^3.3.0

  # PDF generation
  pdf: ^3.11.0
  printing: ^5.13.0

  # HTTP for AI API calls
  dio: ^5.7.0

  # Image processing
  image: ^4.2.0
  flutter_image_compress: ^2.3.0

  # UI helpers
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # Utilities
  uuid: ^4.5.0
  intl: ^0.19.0
  path_provider: ^2.1.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/images/
    - assets/demo/
